{% extends "base.html" %}
{% block title %}Payment Gateway{% endblock title %}
{% block content %}
<div class="card">
    <div class="card-header">
        <h5>Make Donation</h5>
    </div>
    <div class="card-body">
        <div class="row">
            <div class="col-md-12">
                <form>
                    <div class="mb-12">
                        <label class="form-label" for="exampleInputEmail1">Email address</label>
                        <input type="text" class="form-control" id="exampleInputEmail1" aria-describedby="emailHelp" placeholder="Enter email">
                    </div>
                    <div class="mb-12">
                        <label class="form-label" for="exampleInputEmail1">Full Name</label>
                        <input type="text" class="form-control" id="exampleInputEmail1" aria-describedby="fullNameHelp" placeholder="Enter Full Name">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Amount</label>
                        <input type="text" class="form-control" placeholder="NGN 12,000,000">
                    </div>
                        <button type="submit" class="btn btn-primary mb-4">Donate</button>
                    </form>
                </div>
                </div>
            </div>
        </div>
{% endblock content %}
