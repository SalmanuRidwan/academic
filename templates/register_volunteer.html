{% extends "base.html" %}
{% block title %}Volunteer Registration{% endblock %}

{% block content %}
<div class="card">
   <div class="card-header">
      <h5>Register Volunteer</h5>
   </div>
   <div class="card-body">
      <form method="post">
         {% csrf_token %}
         <div class="row">
            <div class="col-md-6">
               <div class="mb-3">
                  <label class="form-label">Email address</label>
                  {{ form.email }}
               </div>
               <div class="mb-3">
                  <label class="form-label">Username</label>
                  {{ form.username }}
               </div>
               <div class="mb-3">
                  <label class="form-label">Location</label>
                  {{ form.location }}
               </div>
               <div class="mb-3 form-check">
                  {{ form.is_available }}
                  <label class="form-check-label" for="{{ form.is_available.id_for_label }}">
                     Ready immediately
                  </label>
               </div>
            </div>

            <div class="col-md-6">
               <div class="mb-3">
                  <label class="form-label">Availability (Days)</label>
                  {{ form.availability }}
               </div>
               <div class="mb-3">
                  <label class="form-label">Skills</label>
                  {{ form.skills }}
               </div>
               <div class="mb-3">
                  <label class="form-label">Bio</label>
                  {{ form.bio }}
               </div>
            </div>
         </div>
         <button type="submit" class="btn btn-primary mb-4">Submit</button>
      </form>
   </div>
</div>
{% endblock %}
